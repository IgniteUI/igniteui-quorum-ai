<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quorum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header__brand">
      <span class="header__logo">⚙</span>
      <span class="header__title">Quorum</span>
    </div>
    <p class="header__subtitle">Consensus-driven AI orchestration · Task decomposition · First-to-ahead-by-<em>K</em> voting · Red-flag validation</p>
  </header>

  <div class="workspace">

    <!-- Left panel: controls -->
    <aside class="controls">

      <label class="field-label" for="prompt">Prompt</label>
      <textarea id="prompt" class="prompt" placeholder="Describe the task you want MAKER to plan and / or execute…" rows="8"></textarea>

      <div class="sliders">
        <div class="slider-row">
          <label for="batchSize">Batch size</label>
          <input id="batchSize" type="range" min="1" max="5" value="3" />
          <span id="batchSizeVal" class="slider-val">3</span>
        </div>
        <div class="slider-row">
          <label for="kInput">K (consensus)</label>
          <input id="kInput" type="range" min="2" max="20" value="10" />
          <span id="kVal" class="slider-val">10</span>
        </div>
        <div class="slider-row">
          <label for="maxSteps">Max steps</label>
          <input id="maxSteps" type="range" min="1" max="50" value="10" />
          <span id="maxStepsVal" class="slider-val">10</span>
        </div>
      </div>

      <div class="format-row">
        <label class="field-label" for="formatSelect">Output format</label>
        <textarea id="formatSelect" class="format-input" placeholder="e.g. plaintext, json, markdown…" rows="2">plaintext</textarea>
      </div>

      <div class="actions">
        <button id="planBtn" class="btn btn--primary">Plan</button>
        <button id="executeBtn" class="btn btn--secondary" disabled>Execute</button>
        <button id="planExecuteBtn" class="btn btn--accent">Plan &amp; Execute</button>
      </div>

      <div id="status" class="status"></div>

      <!-- MCP Servers configuration -->
      <div class="mcp-section">
        <div class="mcp-section__header">
          <label class="field-label">MCP Servers</label>
          <span id="mcpCount" class="badge"></span>
          <button id="mcpToggleBtn" class="mcp-toggle" title="Add server">+</button>
        </div>

        <div id="mcpForm" class="mcp-form" hidden>
          <input id="mcpName"   class="mcp-input" placeholder="Name" />
          <input id="mcpUrl"    class="mcp-input" placeholder="URL (e.g. http://localhost:3001)" />
          <input id="mcpDesc"   class="mcp-input" placeholder="Description (optional)" />
          <input id="mcpApiKey" class="mcp-input" type="password" placeholder="API Key (optional)" />
          <button id="mcpAddBtn" class="btn btn--primary btn--sm">Add</button>
        </div>

        <div id="mcpList" class="mcp-list"></div>
      </div>

    </aside>

    <!-- Right panel: results -->
    <main class="results">

      <section class="panel panel--steps">
        <div class="panel__header">
          <h2 class="panel__title">Plan</h2>
          <span id="stepCount" class="badge"></span>
          <div class="panel__actions">
            <button id="importPlanBtn" class="icon-btn" title="Import plan">⬇</button>
            <button id="exportPlanBtn" class="icon-btn" title="Export plan" disabled>⬆</button>
          </div>
          <input id="importPlanFile" type="file" accept=".json" hidden />
        </div>
        <div id="steps" class="steps-list"></div>
      </section>

      <section class="panel panel--result">
        <div class="panel__header">
          <h2 class="panel__title">Result</h2>
        </div>
        <div id="result" class="result-body"></div>
      </section>

    </main>
  </div>

  <!-- Bottom: live event feed -->
  <footer class="feed-bar">
    <div class="feed-bar__label">Live events</div>
    <div id="feed" class="feed"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
